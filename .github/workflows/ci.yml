name: CI

on:
  pull_request:
    branches:
      - main
      - 'feature/*'

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # review I-5: ruff 違反解消・mypy 設定整備 (N-9, pyproject.toml) 済みのため
      # make lint と同等の lint を CI でも実行する
      - name: Run ruff (lint)
        run: ruff check src/ tests/

      - name: Run mypy (type check)
        run: mypy src/

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=80

  infrastructure-test:
    name: Infrastructure (CDK) Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/cdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/cdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

      - name: Run tests
        run: npm test

      # synth は AWS 認証情報なしでも通ることをローカル検証済み（dev / prod 両方）。
      - name: CDK synth (all stacks)
        run: npx cdk synth --all

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: https://api.example.com
      VITE_LIFF_ID: 0000000000-xxxxxxxx
      VITE_OIDC_AUTHORITY: https://keycloak.example.com/realms/memoru
      VITE_OIDC_CLIENT_ID: liff-client
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e -- --project=chromium
