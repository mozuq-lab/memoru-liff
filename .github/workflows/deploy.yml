name: Deploy to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
      # NOTE (review I-6): CDK (infrastructure/**) の検証は ci.yml の
      # infrastructure-test job (build + test + cdk synth) で実施する。
      # このワークフローは backend/frontend のアプリデプロイ専用で CDK を
      # デプロイしないため、infrastructure/** はトリガに含めない。
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

      - name: Run unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.example.com
          VITE_LIFF_ID: 0000000000-xxxxxxxx
          VITE_OIDC_AUTHORITY: https://keycloak.example.com/realms/memoru
          VITE_OIDC_CLIENT_ID: liff-client

  deploy-backend:
    name: Deploy Backend
    # フロントエンドのデプロイ完了後にバックエンドをデプロイする（CI はこの順序を強制する）。
    # docs/deployment-guide-prod.md 3.5: 逆順（旧フロント + 新バックエンド）だと、
    # 旧フロントが 202 の {job_id, ...} を成功レスポンスと誤解釈し UI が静かに壊れるため不可。
    # 新フロント + 旧バックエンドは互換（デュアル対応）のため安全 → フロント先行必須。
    # 注意: if にステータスチェック関数を含めない場合、needs には暗黙の success() 判定が
    # 適用される（deploy-frontend が失敗/スキップなら本 job もスキップされる、安全側）。
    # needs.deploy-frontend.result == 'success' の明示チェックは意図の明文化のための冗長な
    # 二重ガード。deploy-frontend と if の実行条件（イベント種別・environment の解決方法）が
    # 同一であることを確認済み。
    needs: [test-backend, test-frontend, deploy-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && needs.deploy-frontend.result == 'success'
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: backend
    steps:
      # 多層防御: environment=prod の手動デプロイを main ブランチに限定する。
      # 本来の防御主体は GitHub Environment (prod) 側の Deployment branch policy
      # （Settings → Environments → prod → Deployment branches and tags を
      # "Selected branches" = main に設定）であり、そちらを必ず設定すること
      # (docs/deployment-guide-prod.md 参照)。ここでのチェックはワークフロー定義自体が
      # 未マージのブランチ上で改変され得るため、あくまで補助的な多層防御に過ぎない。
      - name: Guard prod deploy to main branch
        if: (github.event.inputs.environment || 'dev') == 'prod' && github.ref != 'refs/heads/main'
        run: |
          echo "::error::environment=prod への手動デプロイは main ブランチからのみ許可されています（現在の ref: ${{ github.ref }}）。"
          echo "::error::main ブランチで workflow_dispatch を再実行してください。"
          exit 1

      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Validate SAM template
        run: sam validate --lint

      - name: Build SAM application
        run: sam build --use-container

      # 実環境固有の値は GitHub Environment Variables から注入する（public リポジトリ方針）。
      # environment: コンテキスト（下記 environment:）により環境ごとの Variables が解決される。
      # 必須 vars (OIDC_ISSUER, OIDC_AUDIENCE) が未設定なら job を fail させる。
      - name: Deploy to AWS
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
          OIDC_ISSUER: ${{ vars.OIDC_ISSUER }}
          OIDC_AUDIENCE: ${{ vars.OIDC_AUDIENCE }}
          # LIFF フロントの Origin (例: https://liff.<your-domain>)。CORS AllowOrigins に
          # 注入する。prod では必須（未設定なら下記スクリプトで fail-fast。template.yaml
          # の Rules でも二重にガード）。
          LIFF_ORIGIN: ${{ vars.LIFF_ORIGIN }}
          LINE_CHANNEL_ID: ${{ vars.LINE_CHANNEL_ID }}
          USE_STRANDS: ${{ vars.USE_STRANDS }}
          TUTOR_SESSION_BACKEND: ${{ vars.TUTOR_SESSION_BACKEND }}
          AGENTCORE_MEMORY_ID: ${{ vars.AGENTCORE_MEMORY_ID }}
          BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID }}
        run: |
          if [ -z "$OIDC_ISSUER" ] || [ -z "$OIDC_AUDIENCE" ]; then
            echo "::error::必須の GitHub Environment Variables が未設定です（environment=$ENVIRONMENT）。"
            [ -z "$OIDC_ISSUER" ] && echo "::error::  - OIDC_ISSUER"
            [ -z "$OIDC_AUDIENCE" ] && echo "::error::  - OIDC_AUDIENCE"
            echo "::error::設定方法は docs/deployment-guide-prod.md を参照してください。"
            exit 1
          fi
          if [ "$ENVIRONMENT" = "prod" ] && [ -z "$LIFF_ORIGIN" ]; then
            echo "::error::LIFF_ORIGIN が未設定です（prod では必須）。"
            echo "::error::CORS AllowOrigins に本番 LIFF フロントの Origin（例: https://liff.<your-domain>）を注入するために必要です。"
            echo "::error::GitHub Environment Variables に LIFF_ORIGIN を登録してください。詳細は docs/deployment-guide-prod.md を参照。"
            exit 1
          fi
          if [ "$ENVIRONMENT" = "prod" ] && [ "$USE_STRANDS" != "true" ]; then
            echo "::error::USE_STRANDS が prod で \"true\" ではありません（現在の値: ${USE_STRANDS:-<未設定>}）。"
            echo "::error::Tutor 機能は SessionManager 経由のマルチターン会話を使うため USE_STRANDS=true が必須です。"
            echo "::error::false のままだと Tutor ジョブが failed になり、ポーリング時に 503 (ai_unavailable) を返します。"
            echo "::error::GitHub Environment Variables に USE_STRANDS=true を登録してください。詳細は docs/deployment-guide-prod.md を参照。"
            exit 1
          fi
          if [ -z "$LINE_CHANNEL_ID" ]; then
            echo "::warning::LINE_CHANNEL_ID が未設定です。template.yaml の既定値(空)を使用します。"
          fi
          OVERRIDES="Environment=$ENVIRONMENT OidcIssuer=$OIDC_ISSUER OidcAudience=$OIDC_AUDIENCE"
          [ -n "$LIFF_ORIGIN" ]           && OVERRIDES="$OVERRIDES LiffOrigin=$LIFF_ORIGIN"
          [ -n "$LINE_CHANNEL_ID" ]       && OVERRIDES="$OVERRIDES LineChannelId=$LINE_CHANNEL_ID"
          [ -n "$USE_STRANDS" ]           && OVERRIDES="$OVERRIDES UseStrands=$USE_STRANDS"
          [ -n "$TUTOR_SESSION_BACKEND" ] && OVERRIDES="$OVERRIDES TutorSessionBackend=$TUTOR_SESSION_BACKEND"
          [ -n "$AGENTCORE_MEMORY_ID" ]   && OVERRIDES="$OVERRIDES AgentCoreMemoryId=$AGENTCORE_MEMORY_ID"
          [ -n "$BEDROCK_MODEL_ID" ]      && OVERRIDES="$OVERRIDES BedrockModelId=$BEDROCK_MODEL_ID"
          echo "parameter-overrides: $OVERRIDES"
          sam deploy \
            --config-env "$ENVIRONMENT" \
            --parameter-overrides "$OVERRIDES" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

  deploy-frontend:
    name: Deploy Frontend
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      # 多層防御: environment=prod の手動デプロイを main ブランチに限定する。
      # 本来の防御主体は GitHub Environment (prod) 側の Deployment branch policy
      # （Settings → Environments → prod → Deployment branches and tags を
      # "Selected branches" = main に設定）であり、そちらを必ず設定すること
      # (docs/deployment-guide-prod.md 参照)。ここでのチェックはワークフロー定義自体が
      # 未マージのブランチ上で改変され得るため、あくまで補助的な多層防御に過ぎない。
      - name: Guard prod deploy to main branch
        if: (github.event.inputs.environment || 'dev') == 'prod' && github.ref != 'refs/heads/main'
        run: |
          echo "::error::environment=prod への手動デプロイは main ブランチからのみ許可されています（現在の ref: ${{ github.ref }}）。"
          echo "::error::main ブランチで workflow_dispatch を再実行してください。"
          exit 1

      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # フロントの必須環境変数を検証する（deploy-backend の「Deploy to AWS」ステップの
      # fail-fast と対称の方針）。Vite は空値でもビルドが成功してしまうため、未設定・
      # プレースホルダのまま壊れた成果物を S3 へ公開してしまう事故を防ぐ。
      - name: Validate frontend environment variables
        env:
          VITE_API_BASE_URL: ${{ vars.API_URL }}
          VITE_LIFF_ID: ${{ vars.LIFF_ID }}
          VITE_OIDC_AUTHORITY: ${{ vars.OIDC_AUTHORITY }}
          VITE_OIDC_CLIENT_ID: ${{ vars.OIDC_CLIENT_ID }}
        run: |
          MISSING=""
          [ -z "$VITE_API_BASE_URL" ]   && MISSING="$MISSING VITE_API_BASE_URL(API_URL)"
          [ -z "$VITE_LIFF_ID" ]        && MISSING="$MISSING VITE_LIFF_ID(LIFF_ID)"
          [ -z "$VITE_OIDC_AUTHORITY" ] && MISSING="$MISSING VITE_OIDC_AUTHORITY(OIDC_AUTHORITY)"
          [ -z "$VITE_OIDC_CLIENT_ID" ] && MISSING="$MISSING VITE_OIDC_CLIENT_ID(OIDC_CLIENT_ID)"
          if [ -n "$MISSING" ]; then
            echo "::error::必須の GitHub Environment Variables が未設定です:$MISSING"
            echo "::error::設定方法は docs/deployment-guide-prod.md を参照してください。"
            exit 1
          fi
          case "$VITE_API_BASE_URL" in
            https://*) ;;
            *)
              echo "::error::VITE_API_BASE_URL(API_URL) は https:// で始まる URL である必要があります: $VITE_API_BASE_URL"
              exit 1
              ;;
          esac
          case "$VITE_OIDC_AUTHORITY" in
            https://*) ;;
            *)
              echo "::error::VITE_OIDC_AUTHORITY(OIDC_AUTHORITY) は https:// で始まる URL である必要があります: $VITE_OIDC_AUTHORITY"
              exit 1
              ;;
          esac
          PLACEHOLDER_PATTERN='example\.com|placeholder|your-domain|changeme|replace|xxx|todo|dummy'
          for PAIR in "VITE_API_BASE_URL=$VITE_API_BASE_URL" "VITE_LIFF_ID=$VITE_LIFF_ID" "VITE_OIDC_AUTHORITY=$VITE_OIDC_AUTHORITY" "VITE_OIDC_CLIENT_ID=$VITE_OIDC_CLIENT_ID"; do
            VALUE="${PAIR#*=}"
            if echo "$VALUE" | grep -qiE "$PLACEHOLDER_PATTERN"; then
              echo "::error::${PAIR%%=*} にプレースホルダー値が含まれています: $VALUE"
              echo "::error::実環境値を GitHub Environment Variables に設定してください。詳細は docs/deployment-guide-prod.md を参照。"
              exit 1
            fi
          done

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_URL }}
          VITE_LIFF_ID: ${{ vars.LIFF_ID }}
          VITE_OIDC_AUTHORITY: ${{ vars.OIDC_AUTHORITY }}
          VITE_OIDC_CLIENT_ID: ${{ vars.OIDC_CLIENT_ID }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist s3://${{ vars.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
