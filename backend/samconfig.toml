# SAM CLI Configuration for Memoru LIFF Backend

version = 0.1

[default]
[default.global.parameters]
stack_name = "memoru-backend-dev"

[default.build.parameters]
cached = true
parallel = true
use_container = false

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND"
confirm_changeset = true
resolve_s3 = true
region = "ap-northeast-1"
parameter_overrides = "Environment=dev"

[default.local_start_api.parameters]
warm_containers = "EAGER"
docker_network = "memoru-network"

[default.local_invoke.parameters]
docker_network = "memoru-network"

# ------------------------------------------------------------
# NOTE (public リポジトリ方針):
# 実環境固有の値（OidcIssuer / OidcAudience / LineChannelId 等）は
# このファイルにコミットしません。デプロイ時に環境変数 → Makefile が組み立てる
# --parameter-overrides で外部注入します（CI は GitHub Environment Variables）。
# 各環境セクションには Environment のみを固定し、残りは外部注入に委ねます。
# 詳細は docs/deployment-guide-prod.md / deployment-guide-dev.md を参照。
# ------------------------------------------------------------

# Development environment
[dev]
[dev.deploy.parameters]
stack_name = "memoru-backend-dev"
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND"
confirm_changeset = false
resolve_s3 = true
region = "ap-northeast-1"
parameter_overrides = "Environment=dev"

# Staging environment
[staging]
[staging.deploy.parameters]
stack_name = "memoru-backend-staging"
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND"
confirm_changeset = true
resolve_s3 = true
region = "ap-northeast-1"
parameter_overrides = "Environment=staging"

# Production environment
[prod]
[prod.deploy.parameters]
stack_name = "memoru-backend-prod"
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND"
confirm_changeset = true
resolve_s3 = true
region = "ap-northeast-1"
parameter_overrides = "Environment=prod"
