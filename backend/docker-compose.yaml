services:
  dynamodb-local:
    image: amazon/dynamodb-local:2.5.3
    container_name: memoru-dynamodb-local
    user: root
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    ports:
      - "8000:8000"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    networks:
      - memoru-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 5s
      retries: 5

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: memoru-dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: ap-northeast-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    depends_on:
      dynamodb-local:
        condition: service_healthy
    networks:
      - memoru-network

  setup-tables:
    image: amazon/aws-cli:latest
    container_name: memoru-setup-tables
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: ap-northeast-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creating DynamoDB tables..."

        # Create Users Table
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name memoru-users-dev \
          --attribute-definitions \
            AttributeName=user_id,AttributeType=S \
            AttributeName=line_user_id,AttributeType=S \
          --key-schema \
            AttributeName=user_id,KeyType=HASH \
          --global-secondary-indexes \
            '[{"IndexName":"line_user_id-index","KeySchema":[{"AttributeName":"line_user_id","KeyType":"HASH"}],"Projection":{"ProjectionType":"ALL"}}]' \
          --billing-mode PAY_PER_REQUEST \
          2>/dev/null || echo "Users table already exists"

        # Create Cards Table
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name memoru-cards-dev \
          --attribute-definitions \
            AttributeName=user_id,AttributeType=S \
            AttributeName=card_id,AttributeType=S \
            AttributeName=next_review_at,AttributeType=S \
            AttributeName=deck_index_key,AttributeType=S \
            AttributeName=reference_url_key,AttributeType=S \
          --key-schema \
            AttributeName=user_id,KeyType=HASH \
            AttributeName=card_id,KeyType=RANGE \
          --global-secondary-indexes \
            '[{"IndexName":"user_id-due-index","KeySchema":[{"AttributeName":"user_id","KeyType":"HASH"},{"AttributeName":"next_review_at","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}},{"IndexName":"deck-cards-index","KeySchema":[{"AttributeName":"deck_index_key","KeyType":"HASH"},{"AttributeName":"next_review_at","KeyType":"RANGE"}],"Projection":{"ProjectionType":"KEYS_ONLY"}},{"IndexName":"reference-url-index","KeySchema":[{"AttributeName":"reference_url_key","KeyType":"HASH"}],"Projection":{"ProjectionType":"ALL"}}]' \
          --billing-mode PAY_PER_REQUEST \
          2>/dev/null || echo "Cards table already exists"

        # Create Reviews Table
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name memoru-reviews-dev \
          --attribute-definitions \
            AttributeName=card_id,AttributeType=S \
            AttributeName=reviewed_at,AttributeType=S \
            AttributeName=user_id,AttributeType=S \
          --key-schema \
            AttributeName=card_id,KeyType=HASH \
            AttributeName=reviewed_at,KeyType=RANGE \
          --global-secondary-indexes \
            '[{"IndexName":"user_id-reviewed_at-index","KeySchema":[{"AttributeName":"user_id","KeyType":"HASH"},{"AttributeName":"reviewed_at","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]' \
          --billing-mode PAY_PER_REQUEST \
          2>/dev/null || echo "Reviews table already exists"

        # Create Decks Table
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name memoru-decks-dev \
          --attribute-definitions \
            AttributeName=user_id,AttributeType=S \
            AttributeName=deck_id,AttributeType=S \
          --key-schema \
            AttributeName=user_id,KeyType=HASH \
            AttributeName=deck_id,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          2>/dev/null || echo "Decks table already exists"

        # Create Tutor Sessions Table
        # (TTL は DynamoDB Local では強制されないため設定省略)
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name memoru-tutor-sessions-dev \
          --attribute-definitions \
            AttributeName=user_id,AttributeType=S \
            AttributeName=session_id,AttributeType=S \
            AttributeName=status,AttributeType=S \
          --key-schema \
            AttributeName=user_id,KeyType=HASH \
            AttributeName=session_id,KeyType=RANGE \
          --global-secondary-indexes \
            '[{"IndexName":"user_id-status-index","KeySchema":[{"AttributeName":"user_id","KeyType":"HASH"},{"AttributeName":"status","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]' \
          --billing-mode PAY_PER_REQUEST \
          2>/dev/null || echo "Tutor sessions table already exists"

        # Create Browser Profiles Table
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name memoru-browser-profiles-dev \
          --attribute-definitions \
            AttributeName=user_id,AttributeType=S \
            AttributeName=profile_id,AttributeType=S \
          --key-schema \
            AttributeName=user_id,KeyType=HASH \
            AttributeName=profile_id,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          2>/dev/null || echo "Browser profiles table already exists"

        # Create Processed Events Table (Webhook 冪等 + URL カード保存ストア)
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name memoru-processed-events-dev \
          --attribute-definitions \
            AttributeName=webhook_event_id,AttributeType=S \
          --key-schema \
            AttributeName=webhook_event_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          2>/dev/null || echo "Processed events table already exists"

        # Create AI Jobs Table (ai-async-jobs: inline モードでもジョブレコードを保存する)
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name memoru-ai-jobs-dev \
          --attribute-definitions \
            AttributeName=job_id,AttributeType=S \
          --key-schema \
            AttributeName=job_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          2>/dev/null || echo "AI jobs table already exists"

        echo "Tables created successfully!"
        aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000
    networks:
      - memoru-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: memoru-keycloak
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      # I-11: admin/admin はローカル開発専用の固定資格情報。start-dev モードで
      # ローカルホストからのみ利用する前提のため弱い値で問題ない。本番 Keycloak
      # (infrastructure/cdk/lib/keycloak-stack.ts) では別途強い資格情報を使うこと。
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ../infrastructure/keycloak/realm-local.json:/opt/keycloak/data/import/memoru-realm.json
    networks:
      - memoru-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200'",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  ollama:
    image: ollama/ollama:latest
    container_name: memoru-ollama
    # I-11: 公開ポートはループバック (127.0.0.1) のみにバインドし、ホストの全
    # ネットワークインターフェースへ Ollama を露出しない。ホスト (Makefile /
    # SAM Local) は localhost:11434 で従来どおりアクセス可能。
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      # コンテナ内サーバーは 0.0.0.0 で待ち受ける必要がある (公開ポートおよび
      # memoru-network 上の他コンテナからの接続を受けるため)。外部公開は上の
      # ports バインドを 127.0.0.1 に絞ることで制御している。
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - memoru-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  memoru-network:
    name: memoru-network
    driver: bridge

volumes:
  dynamodb-data:
    name: memoru-dynamodb-data
  ollama-data:
    name: memoru-ollama-data
