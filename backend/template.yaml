        # ai-async-jobs: ジョブ登録 + interactive キュー送信
        - DynamoDBCrudPolicy:
            TableName: !Ref AiJobsTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt AiJobQueue.QueueName
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              # inference profile + 配下の foundation-model ("global." 除去で導出)
              Resource:
                - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${BedrockModelId}
                - !Sub
                  - arn:aws:bedrock:*::foundation-model/${FoundationModelId}
                  - FoundationModelId: !Select [1, !Split ["global.", !Ref BedrockModelId]]
      Environment:
