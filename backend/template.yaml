  # URL Card Generation Function (dedicated for longer timeout)
  UrlGenerateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub memoru-url-generate-${Environment}
      CodeUri: src/
      Handler: api.handler.url_generate_handler
      Description: AI card generation from URL handler for POST /cards/generate-from-url
      Timeout: 120
      MemorySize: 512
      ReservedConcurrentExecutions: 10
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CardsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref DecksTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RateLimitsTable
        # ai-async-jobs: ジョブ登録 (generate_from_url) + heavy キュー送信
        - DynamoDBCrudPolicy:
            TableName: !Ref AiJobsTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt AiJobHeavyQueue.QueueName
        # NOTE: AgentCore Browser 統合は未実装のため、関連 IAM (bedrock-agentcore:*)
        # と BrowserProfilesTable Read 権限、AGENTCORE_BROWSER_REGION /
        # BROWSER_PROFILES_TABLE 環境変数は意図的に外している。
        # SPA / 認証付きページ取得を再有効化する際にまとめて復活させる。
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              # inference profile + 配下の foundation-model ("global." 除去で導出)
              Resource:
                - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${BedrockModelId}
                - !Sub
                  - arn:aws:bedrock:*::foundation-model/${FoundationModelId}
                  - FoundationModelId: !Select [1, !Split ["global.", !Ref BedrockModelId]]
      Environment:
