AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Memoru LIFF - Backend API and DynamoDB Tables

Globals:
  Function:
    Timeout: 120
    MemorySize: 256
    Runtime: python3.12
    Architectures:
      - arm64
    Tracing: Active
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        USERS_TABLE: !Ref UsersTable
        CARDS_TABLE: !Ref CardsTable
        REVIEWS_TABLE: !Ref ReviewsTable
        DECKS_TABLE: !Ref DecksTable
        TUTOR_SESSIONS_TABLE: !Ref TutorSessionsTable
        LOG_LEVEL: !If [IsProd, INFO, DEBUG]
        DYNAMODB_ENDPOINT_URL: ""
        AWS_ENDPOINT_URL: ""
        USE_STRANDS: !Ref UseStrands
        OLLAMA_HOST: ""
        OLLAMA_MODEL: ""
        TUTOR_SESSION_BACKEND: !Ref TutorSessionBackend
        AGENTCORE_MEMORY_ID: !Ref AgentCoreMemoryId

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name

  OidcIssuer:
    Type: String
    Default: https://keycloak.example.com/realms/memoru
    Description: OIDC Issuer URL (Keycloak or Cognito)

  OidcAudience:
    Type: String
    Default: liff-client
    Description: OIDC Audience (JWT audience claim)

  # NOTE (Bedrock IAM): モデル ID は cross-region (global) inference profile 形式
  # "global.anthropic...." を前提とする。IAM の bedrock:InvokeModel Resource は
  # inference-profile ARN と、その配下の foundation-model ARN の両方を必要とする。
  # foundation-model ID は "global." プレフィックスを除いた値 (!Split ["global.", ...])
  # で導出するため、ここで指定する値は必ず "global." で始まる ID にすること。
  BedrockModelId:
    Type: String
    Default: global.anthropic.claude-haiku-4-5-20251001-v1:0
    Description: >-
      Amazon Bedrock model ID for AI card generation.
      Must be a cross-region (global) inference profile ID starting with "global."
      (IAM derives the underlying foundation-model ARN by stripping the "global." prefix).

  TutorModelId:
    Type: String
    Default: ""
    Description: >-
      Bedrock model ID for AI tutor (defaults to BedrockModelId if empty).
      When set, must also be a "global."-prefixed cross-region inference profile ID.

  LineChannelId:
    Type: String
    Default: ""
    Description: LINE Login Channel ID for ID token verification

  # NOTE: Tutor 機能 (TutorService) は SessionManager 経由のマルチターン会話を使うため
  # USE_STRANDS=true が必須。false のままだと start_session / send_message が 503
  # (code=tutor_unavailable) を返す — BedrockTutorAIService は SessionManager 非対応のため。
  # 本番 (ENVIRONMENT=prod) では true で運用すること。dev スタックで true にする場合は
  # StrandsTutorAIService が Ollama を要求する点に注意 (ローカル開発用)。
  UseStrands:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable Strands Agents SDK for AI services (Tutor requires "true"; otherwise tutor endpoints return 503 tutor_unavailable)

  TutorSessionBackend:
    Type: String
    Default: "dynamodb"
    AllowedValues:
      - "agentcore"
      - "dynamodb"
    Description: Tutor session history backend (agentcore or dynamodb)

  AgentCoreMemoryId:
    Type: String
    Default: ""
    Description: AgentCore Memory ID for tutor session management

Conditions:
  IsProd: !Equals [!Ref Environment, prod]
  IsNotProd: !Not [!Equals [!Ref Environment, prod]]
  HasTutorModelId: !Not [!Equals [!Ref TutorModelId, ""]]
  UseAgentCore: !Equals [!Ref TutorSessionBackend, "agentcore"]

Resources:
  #============================================================
  # DynamoDB Tables
  #============================================================

  # Users Table
  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub memoru-users-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: line_user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: line_user_id-index
          KeySchema:
            - AttributeName: line_user_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      DeletionProtectionEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # Cards Table
  CardsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub memoru-cards-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: card_id
          AttributeType: S
        - AttributeName: next_review_at
          AttributeType: S
        - AttributeName: deck_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: card_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: user_id-due-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: next_review_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # deck_id-due-index: デッキ別カード集計 (get_deck_card_counts / get_deck_due_counts) を
        # COUNT クエリ化するための GSI。カウント用途のみのため Projection は KEYS_ONLY で最小化する。
        # next_review_at を RANGE キーに置くことで due 集計を KeyCondition (deck_id = :d AND
        # next_review_at <= :now) で絞り込める。next_review_at は ISO8601 文字列で、辞書順比較が
        # 時刻順と一致する (review #11)。
        # 注意 1 (スパースインデックス): deck_id 属性を持たないカードはこの GSI に投影されないため、
        # 未分類カード (deck_id なし) は集計対象に含まれない。
        # 注意 2 (オンラインバックフィル): 既存テーブルへの GSI 追加は DynamoDB が
        # バックフィルを自動実行する。バックフィル完了までは GSI クエリが不完全な結果を返し得る。
        - IndexName: deck_id-due-index
          KeySchema:
            - AttributeName: deck_id
              KeyType: HASH
            - AttributeName: next_review_at
              KeyType: RANGE
          Projection:
            ProjectionType: KEYS_ONLY
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      DeletionProtectionEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # Reviews Table
  ReviewsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub memoru-reviews-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: card_id
          AttributeType: S
        - AttributeName: reviewed_at
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: card_id
          KeyType: HASH
        - AttributeName: reviewed_at
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: user_id-reviewed_at-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: reviewed_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # TTL は指定しない (I-7): review_service は expires_at を書き込まないため
      # TimeToLiveSpecification を設定しても実質無効だった。レビュー履歴は統計用に
      # 永久保持する。保持方針を変える場合は、コード側で expires_at を書き込む実装と
      # セットで TimeToLiveSpecification (AttributeName: expires_at) を再導入すること。
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      DeletionProtectionEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # Tutor Sessions Table
  TutorSessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub memoru-tutor-sessions-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: session_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: user_id-status-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      DeletionProtectionEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # Decks Table
  DecksTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub memoru-decks-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: deck_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: deck_id
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      DeletionProtectionEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  BrowserProfilesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub memoru-browser-profiles-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: profile_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: profile_id
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      DeletionProtectionEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # Processed webhook events table — idempotency for LINE webhook redelivery (N-6)
  ProcessedEventsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub memoru-processed-events-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: webhook_event_id
          AttributeType: S
      KeySchema:
        - AttributeName: webhook_event_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      DeletionProtectionEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  #============================================================
  # API Gateway (HTTP API)
  #============================================================

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins: !If
          - IsNotProd
          - - https://liff.line.me
            - https://liff.example.com
            - http://localhost:5173
            - http://localhost:3000
          - - https://liff.line.me
            - https://liff.example.com
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Amz-Date
          - X-Api-Key
          - X-Amz-Security-Token
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        # AllowCredentials は指定しない (#14): Bearer トークン運用で Cookie を使わないため
        # 不要。フロント (frontend/src/services/api.ts) の fetch も credentials:'include'
        # を使っておらず、Authorization ヘッダーのみで認証している。
        MaxAge: 3600
      Auth:
        DefaultAuthorizer: JwtAuthorizer
        Authorizers:
          JwtAuthorizer:
            AuthorizationScopes:
              - openid
              - profile
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Ref OidcIssuer
              audience:
                - !Ref OidcAudience
      Tags:
        Environment: !Ref Environment
        Application: memoru

  #============================================================
  # Lambda Functions
  #============================================================

  # Main API Function
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub memoru-api-${Environment}
      CodeUri: src/
      Handler: api.handler.handler
      Description: Main API handler for Memoru LIFF application
      ReservedConcurrentExecutions: 100
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CardsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref DecksTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BrowserProfilesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref TutorSessionsTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              # cross-region (global) inference profile とその配下の foundation-model の両方を許可。
              # foundation-model ID は BedrockModelId から "global." を除いた値で導出する。
              Resource:
                - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${BedrockModelId}
                - !Sub
                  - arn:aws:bedrock:*::foundation-model/${FoundationModelId}
                  - FoundationModelId: !Select [1, !Split ["global.", !Ref BedrockModelId]]
        - !If
          - HasTutorModelId
          - Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${TutorModelId}
                  - !Sub
                    - arn:aws:bedrock:*::foundation-model/${FoundationModelId}
                    - FoundationModelId: !Select [1, !Split ["global.", !Ref TutorModelId]]
          - !Ref AWS::NoValue
        - !If
          - UseAgentCore
          - Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeMemory
                  - bedrock-agentcore:RetrieveMemory
                  - bedrock-agentcore:CreateEvent
                  - bedrock-agentcore:GetEvent
                  - bedrock-agentcore:ListEvents
                  - bedrock-agentcore:RetrieveMemoryRecords
                Resource: "*"
          - !Ref AWS::NoValue
      Environment:
        Variables:
          OIDC_ISSUER: !Ref OidcIssuer
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          TUTOR_MODEL_ID: !Ref TutorModelId
          LINE_CHANNEL_ID: !Ref LineChannelId
          BROWSER_PROFILES_TABLE: !Ref BrowserProfilesTable
      Events:
        # User endpoints
        GetUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /users/me
            Method: GET
        UpdateUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /users/me/settings
            Method: PUT
        LinkLine:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /users/link-line
            Method: POST
        UnlinkLine:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /users/me/unlink-line
            Method: POST
        # Card endpoints
        ListCards:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /cards
            Method: GET
        CreateCard:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /cards
            Method: POST
        GetCard:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /cards/{cardId}
            Method: GET
        UpdateCard:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /cards/{cardId}
            Method: PUT
        DeleteCard:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /cards/{cardId}
            Method: DELETE
        # Review endpoints
        GetDueCards:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /cards/due
            Method: GET
        SubmitReview:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /reviews/{cardId}
            Method: POST
        UndoReview:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /reviews/{cardId}/undo
            Method: POST
        GetReviewStats:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /reviews/stats
            Method: GET
        # AI Generation endpoint
        GenerateCards:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /cards/generate
            Method: POST
        # Deck endpoints
        ListDecks:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /decks
            Method: GET
        CreateDeck:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /decks
            Method: POST
        UpdateDeck:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /decks/{deckId}
            Method: PUT
        DeleteDeck:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /decks/{deckId}
            Method: DELETE
        # Stats endpoints
        GetStats:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /stats
            Method: GET
        GetWeakCards:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /stats/weak-cards
            Method: GET
        GetForecast:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /stats/forecast
            Method: GET
        # Browser profile endpoints
        ListBrowserProfiles:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /browser-profiles
            Method: GET
        CreateBrowserProfile:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /browser-profiles
            Method: POST
        DeleteBrowserProfile:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /browser-profiles/{profileId}
            Method: DELETE
        # Tutor endpoints
        CreateTutorSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tutor/sessions
            Method: POST
        SendTutorMessage:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tutor/sessions/{sessionId}/messages
            Method: POST
        EndTutorSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tutor/sessions/{sessionId}
            Method: DELETE
        ListTutorSessions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tutor/sessions
            Method: GET
        GetTutorSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tutor/sessions/{sessionId}
            Method: GET
      Tags:
        Environment: !Ref Environment
        Application: memoru

  # LINE Webhook Function
  LineWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub memoru-line-webhook-${Environment}
      CodeUri: src/
      Handler: webhook.line_handler.handler
      Description: LINE Messaging API webhook handler
      ReservedConcurrentExecutions: 50
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CardsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProcessedEventsTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:memoru-${Environment}-line-credentials-*
        # NOTE (N-5): URL カード生成は SQS ワーカー (UrlGenerateWorkerFunction) へ
        # 非同期化したが、Bedrock 権限は残す。legacy postback フォールバック
        # (handle_save_url_cards_legacy) が古い形式の保存 postback でカードを再生成
        # するため、受付 Lambda でも Bedrock invoke が必要になりうる。
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              # inference profile + 配下の foundation-model ("global." 除去で導出)
              Resource:
                - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${BedrockModelId}
                - !Sub
                  - arn:aws:bedrock:*::foundation-model/${FoundationModelId}
                  - FoundationModelId: !Select [1, !Split ["global.", !Ref BedrockModelId]]
        # N-5: 受付 Lambda は URL カード生成リクエストをワーカーキューへ enqueue する。
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt UrlGenerateQueue.Arn
      Environment:
        Variables:
          LINE_CHANNEL_SECRET_ARN: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:memoru-${Environment}-line-credentials
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          PROCESSED_EVENTS_TABLE: !Ref ProcessedEventsTable
          # N-5: 設定されていれば URL カード生成を SQS ワーカーへ非同期化する。
          URL_GENERATE_QUEUE_URL: !Ref UrlGenerateQueue
      Events:
        LineWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /webhook/line
            Method: POST
            Auth:
              Authorizer: NONE
      Tags:
        Environment: !Ref Environment
        Application: memoru

  # Dead Letter Queue for the scheduled DuePushJobFunction.
  # Captures failed asynchronous (Schedule) invocations so reminder
  # delivery failures are not silently lost.
  # NOTE: A CloudWatch Alarm on ApproximateNumberOfMessagesVisible is
  # out of scope for this change (see review I-3) and should be added
  # in a follow-up to surface failures operationally.
  DuePushJobDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub memoru-due-push-dlq-${Environment}
      # 14 days (in seconds) — maximum retention to allow ample time to
      # inspect/replay failed reminder invocations.
      MessageRetentionPeriod: 1209600
      # Encrypt with the AWS-managed KMS key for SQS, consistent with the
      # KMS-encrypted DynamoDB tables (SSEType: KMS) used elsewhere.
      SqsManagedSseEnabled: false
      KmsMasterKeyId: alias/aws/sqs
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # Due Push Job Function (Scheduled)
  DuePushJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub memoru-due-push-${Environment}
      CodeUri: src/
      Handler: jobs.due_push_handler.handler
      Description: Scheduled job to send review reminders via LINE
      Timeout: 300
      ReservedConcurrentExecutions: 5
      # Route failed async (Schedule) invocations to the DLQ so reminder
      # failures are retained instead of being dropped.
      EventInvokeConfig:
        DestinationConfig:
          OnFailure:
            Type: SQS
            Destination: !GetAtt DuePushJobDLQ.Arn
      Policies:
        # I-4: 最小権限の意図 — Users/Cards は Read 全般 (Query/GetItem/Scan)、
        # 書き込みは Users テーブルの last_notified_date を更新する UpdateItem のみ。
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBReadPolicy:
            TableName: !Ref CardsTable
        # UsersTable の last_notified_date を更新するための UpdateItem のみを許可。
        # Resource はテーブル本体の ARN のみ (GSI は含めない) — GSI への直接書き込みは
        # DynamoDB では不可能なため、ベーステーブル ARN だけで十分。
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !GetAtt UsersTable.Arn
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:memoru-${Environment}-line-credentials-*
        # Allow the function's execution role to deliver failed-invocation
        # records to the DLQ.
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt DuePushJobDLQ.Arn
      Environment:
        Variables:
          LINE_CHANNEL_SECRET_ARN: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:memoru-${Environment}-line-credentials
      Events:
        ScheduleRule:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Description: Check for users with due cards every 5 minutes (notification time check is done in Lambda)
            Enabled: !If [IsProd, true, false]
      Tags:
        Environment: !Ref Environment
        Application: memoru

  # Reviews Grade AI Function
  ReviewsGradeAiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub memoru-reviews-grade-ai-${Environment}
      CodeUri: src/
      Handler: api.handler.grade_ai_handler
      Description: AI grading handler for POST /reviews/{cardId}/grade-ai
      Timeout: 60
      MemorySize: 512
      ReservedConcurrentExecutions: 20
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CardsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewsTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              # inference profile + 配下の foundation-model ("global." 除去で導出)
              Resource:
                - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${BedrockModelId}
                - !Sub
                  - arn:aws:bedrock:*::foundation-model/${FoundationModelId}
                  - FoundationModelId: !Select [1, !Split ["global.", !Ref BedrockModelId]]
      Environment:
        Variables:
          OIDC_ISSUER: !Ref OidcIssuer
          BEDROCK_MODEL_ID: !Ref BedrockModelId
      Events:
        ReviewsGradeAi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /reviews/{cardId}/grade-ai
            Method: POST
      Tags:
        Environment: !Ref Environment
        Application: memoru

  # Advice Function
  AdviceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub memoru-advice-${Environment}
      CodeUri: src/
      Handler: api.handler.advice_handler
      Description: AI learning advice handler for GET /advice
      Timeout: 60
      MemorySize: 512
      ReservedConcurrentExecutions: 20
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CardsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewsTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              # inference profile + 配下の foundation-model ("global." 除去で導出)
              Resource:
                - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${BedrockModelId}
                - !Sub
                  - arn:aws:bedrock:*::foundation-model/${FoundationModelId}
                  - FoundationModelId: !Select [1, !Split ["global.", !Ref BedrockModelId]]
      Environment:
        Variables:
          OIDC_ISSUER: !Ref OidcIssuer
          BEDROCK_MODEL_ID: !Ref BedrockModelId
      Events:
        Advice:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /advice
            Method: GET
      Tags:
        Environment: !Ref Environment
        Application: memoru

  # URL Card Generation Function (dedicated for longer timeout)
  UrlGenerateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub memoru-url-generate-${Environment}
      CodeUri: src/
      Handler: api.handler.url_generate_handler
      Description: AI card generation from URL handler for POST /cards/generate-from-url
      Timeout: 120
      MemorySize: 512
      ReservedConcurrentExecutions: 10
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CardsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref DecksTable
        # NOTE: AgentCore Browser 統合は未実装のため、関連 IAM (bedrock-agentcore:*)
        # と BrowserProfilesTable Read 権限、AGENTCORE_BROWSER_REGION /
        # BROWSER_PROFILES_TABLE 環境変数は意図的に外している。
        # SPA / 認証付きページ取得を再有効化する際にまとめて復活させる。
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              # inference profile + 配下の foundation-model ("global." 除去で導出)
              Resource:
                - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${BedrockModelId}
                - !Sub
                  - arn:aws:bedrock:*::foundation-model/${FoundationModelId}
                  - FoundationModelId: !Select [1, !Split ["global.", !Ref BedrockModelId]]
      Environment:
        Variables:
          OIDC_ISSUER: !Ref OidcIssuer
          BEDROCK_MODEL_ID: !Ref BedrockModelId
      Events:
        UrlGenerate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /cards/generate-from-url
            Method: POST
      Tags:
        Environment: !Ref Environment
        Application: memoru

  #============================================================
  # N-5: URL カード生成の SQS 非同期化
  #============================================================

  # Dead Letter Queue for UrlGenerateWorkerFunction.
  # After maxReceiveCount (3) failed deliveries a message lands here so failed
  # URL card generations are retained for inspection instead of being lost.
  # NOTE: A CloudWatch Alarm on ApproximateNumberOfMessagesVisible is out of
  # scope for this change and should be added in a follow-up (matches the
  # DuePushJobDLQ convention).
  UrlGenerateWorkerDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub memoru-url-generate-dlq-${Environment}
      # 14 days (in seconds) — maximum retention to allow ample time to
      # inspect/replay failed URL card generation messages.
      MessageRetentionPeriod: 1209600
      # Encrypt with the AWS-managed KMS key for SQS, consistent with the
      # KMS-encrypted DynamoDB tables and DuePushJobDLQ used elsewhere.
      SqsManagedSseEnabled: false
      KmsMasterKeyId: alias/aws/sqs
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # Main work queue: webhook Lambda enqueues; UrlGenerateWorkerFunction consumes.
  UrlGenerateQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub memoru-url-generate-${Environment}
      # VisibilityTimeout must exceed the worker Timeout (120s) so a slow-but-
      # alive invocation is not redelivered mid-flight.
      VisibilityTimeout: 180
      SqsManagedSseEnabled: false
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt UrlGenerateWorkerDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # URL Card Generation Worker (SQS-triggered, async N-5).
  # Fetch → chunk → Bedrock → store → preview push. Uses ReportBatchItemFailures
  # so a failed message is retried by SQS (up to maxReceiveCount) instead of
  # being dropped or re-running the whole batch.
  UrlGenerateWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub memoru-url-generate-worker-${Environment}
      CodeUri: src/
      Handler: jobs.url_generate_worker_handler.handler
      Description: SQS worker for asynchronous URL card generation (N-5)
      Timeout: 120
      MemorySize: 512
      Policies:
        # ProcessedEventsTable: ワーカー側冪等クレーム (URLGENWORK#<event_id>) の
        # 読み書き + URL カードストア (URLCARDS#) の保存に使用。
        - DynamoDBCrudPolicy:
            TableName: !Ref ProcessedEventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:memoru-${Environment}-line-credentials-*
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              # inference profile + 配下の foundation-model ("global." 除去で導出)
              Resource:
                - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${BedrockModelId}
                - !Sub
                  - arn:aws:bedrock:*::foundation-model/${FoundationModelId}
                  - FoundationModelId: !Select [1, !Split ["global.", !Ref BedrockModelId]]
      Environment:
        Variables:
          LINE_CHANNEL_SECRET_ARN: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:memoru-${Environment}-line-credentials
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          PROCESSED_EVENTS_TABLE: !Ref ProcessedEventsTable
      Events:
        UrlGenerateSqs:
          Type: SQS
          Properties:
            Queue: !GetAtt UrlGenerateQueue.Arn
            # 1 件の処理時間 (60〜100 秒級) が Lambda Timeout (120s) に近いため、
            # BatchSize を 1 にしてバッチ途中のタイムアウトによる未処理メッセージの
            # 巻き込み (receive count 増加 → 不当な DLQ 送り) を防ぐ。
            BatchSize: 1
            # 部分失敗を SQS に返し、失敗メッセージのみリトライさせる
            # （BatchSize 1 でも防御として残す）。
            FunctionResponseTypes:
              - ReportBatchItemFailures
            # Bedrock 同時実行を抑えるためワーカーの最大同時実行を制限する。
            ScalingConfig:
              MaximumConcurrency: 2
      Tags:
        Environment: !Ref Environment
        Application: memoru

  #============================================================
  # CloudWatch Logs - LogGroups with Retention
  #============================================================

  # API Function LogGroup
  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ApiFunction}"
      RetentionInDays: !If [IsProd, 90, 14]

  # LINE Webhook Function LogGroup
  LineWebhookFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${LineWebhookFunction}"
      RetentionInDays: !If [IsProd, 90, 14]

  # Due Push Job Function LogGroup
  DuePushJobFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${DuePushJobFunction}"
      RetentionInDays: !If [IsProd, 90, 14]

  # Reviews Grade AI Function LogGroup
  ReviewsGradeAiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ReviewsGradeAiFunction}"
      RetentionInDays: !If [IsProd, 90, 14]

  # Advice Function LogGroup
  AdviceFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AdviceFunction}"
      RetentionInDays: !If [IsProd, 90, 14]

  # URL Generate Worker Function LogGroup (N-5)
  UrlGenerateWorkerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${UrlGenerateWorkerFunction}"
      RetentionInDays: !If [IsProd, 90, 14]

  #============================================================
  # CloudWatch Monitoring (Production Only)
  #============================================================

  # SNS Topic for Alerts
  AlertSNSTopic:
    Type: AWS::SNS::Topic
    Condition: IsProd
    Properties:
      TopicName: !Sub memoru-${Environment}-alerts
      DisplayName: Memoru LIFF Alerts
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # Lambda Error Alarm
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub memoru-${Environment}-lambda-errors
      AlarmDescription: Lambda function error rate exceeds threshold
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      AlarmActions:
        - !Ref AlertSNSTopic
      TreatMissingData: notBreaching

  # API Gateway 5xx Error Alarm
  ApiGateway5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub memoru-${Environment}-api-5xx-errors
      AlarmDescription: API Gateway 5xx error rate exceeds threshold
      MetricName: 5xx
      Namespace: AWS/ApiGateway
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiId
          Value: !Ref HttpApi
      AlarmActions:
        - !Ref AlertSNSTopic
      TreatMissingData: notBreaching

  # DynamoDB Throttle Alarm
  DynamoDBThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub memoru-${Environment}-dynamodb-throttle
      AlarmDescription: DynamoDB throttling detected
      MetricName: ThrottledRequests
      Namespace: AWS/DynamoDB
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: TableName
          Value: !Ref CardsTable
      AlarmActions:
        - !Ref AlertSNSTopic
      TreatMissingData: notBreaching

  # CloudWatch Dashboard
  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Condition: IsProd
    Properties:
      DashboardName: !Sub memoru-${Environment}-dashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Lambda Invocations & Errors",
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "${ApiFunction}", {"color": "#2ca02c"}],
                  [".", "Errors", ".", ".", {"color": "#d62728"}],
                  [".", "Invocations", "FunctionName", "${LineWebhookFunction}", {"color": "#1f77b4"}],
                  [".", "Errors", ".", ".", {"color": "#ff7f0e"}]
                ],
                "region": "${AWS::Region}",
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Lambda Duration",
                "metrics": [
                  ["AWS/Lambda", "Duration", "FunctionName", "${ApiFunction}", {"stat": "p50"}],
                  ["...", {"stat": "p90"}],
                  ["...", {"stat": "p99"}]
                ],
                "region": "${AWS::Region}",
                "period": 300
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "API Gateway Requests",
                "metrics": [
                  ["AWS/ApiGateway", "Count", "ApiId", "${HttpApi}", {"color": "#2ca02c"}],
                  [".", "5xx", ".", ".", {"color": "#d62728"}],
                  [".", "4xx", ".", ".", {"color": "#ff7f0e"}]
                ],
                "region": "${AWS::Region}",
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "API Gateway Latency",
                "metrics": [
                  ["AWS/ApiGateway", "Latency", "ApiId", "${HttpApi}", {"stat": "p50"}],
                  ["...", {"stat": "p90"}],
                  ["...", {"stat": "p99"}]
                ],
                "region": "${AWS::Region}",
                "period": 300
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 12,
              "width": 8,
              "height": 6,
              "properties": {
                "title": "DynamoDB - Users Table",
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${UsersTable}"],
                  [".", "ConsumedWriteCapacityUnits", ".", "."]
                ],
                "region": "${AWS::Region}",
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "x": 8,
              "y": 12,
              "width": 8,
              "height": 6,
              "properties": {
                "title": "DynamoDB - Cards Table",
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${CardsTable}"],
                  [".", "ConsumedWriteCapacityUnits", ".", "."]
                ],
                "region": "${AWS::Region}",
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "x": 16,
              "y": 12,
              "width": 8,
              "height": 6,
              "properties": {
                "title": "DynamoDB - Reviews Table",
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${ReviewsTable}"],
                  [".", "ConsumedWriteCapacityUnits", ".", "."]
                ],
                "region": "${AWS::Region}",
                "period": 300,
                "stat": "Sum"
              }
            }
          ]
        }

Outputs:
  # DynamoDB Tables
  UsersTableName:
    Description: Users table name
    Value: !Ref UsersTable
    Export:
      Name: !Sub memoru-${Environment}-users-table

  UsersTableArn:
    Description: Users table ARN
    Value: !GetAtt UsersTable.Arn
    Export:
      Name: !Sub memoru-${Environment}-users-table-arn

  CardsTableName:
    Description: Cards table name
    Value: !Ref CardsTable
    Export:
      Name: !Sub memoru-${Environment}-cards-table

  CardsTableArn:
    Description: Cards table ARN
    Value: !GetAtt CardsTable.Arn
    Export:
      Name: !Sub memoru-${Environment}-cards-table-arn

  ReviewsTableName:
    Description: Reviews table name
    Value: !Ref ReviewsTable
    Export:
      Name: !Sub memoru-${Environment}-reviews-table

  ReviewsTableArn:
    Description: Reviews table ARN
    Value: !GetAtt ReviewsTable.Arn
    Export:
      Name: !Sub memoru-${Environment}-reviews-table-arn

  DecksTableName:
    Description: Decks table name
    Value: !Ref DecksTable
    Export:
      Name: !Sub memoru-${Environment}-decks-table

  DecksTableArn:
    Description: Decks table ARN
    Value: !GetAtt DecksTable.Arn
    Export:
      Name: !Sub memoru-${Environment}-decks-table-arn

  TutorSessionsTableName:
    Description: Tutor Sessions table name
    Value: !Ref TutorSessionsTable
    Export:
      Name: !Sub memoru-${Environment}-tutor-sessions-table

  TutorSessionsTableArn:
    Description: Tutor Sessions table ARN
    Value: !GetAtt TutorSessionsTable.Arn
    Export:
      Name: !Sub memoru-${Environment}-tutor-sessions-table-arn

  # API Gateway
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub memoru-${Environment}-api-endpoint

  # Lambda Functions
  ApiFunctionArn:
    Description: API Lambda function ARN
    Value: !GetAtt ApiFunction.Arn
    Export:
      Name: !Sub memoru-${Environment}-api-function-arn

  LineWebhookFunctionArn:
    Description: LINE Webhook Lambda function ARN
    Value: !GetAtt LineWebhookFunction.Arn
    Export:
      Name: !Sub memoru-${Environment}-line-webhook-function-arn

  ReviewsGradeAiFunctionArn:
    Description: Reviews Grade AI Lambda function ARN
    Value: !GetAtt ReviewsGradeAiFunction.Arn
    Export:
      Name: !Sub memoru-${Environment}-reviews-grade-ai-function-arn

  AdviceFunctionArn:
    Description: Advice Lambda function ARN
    Value: !GetAtt AdviceFunction.Arn
    Export:
      Name: !Sub memoru-${Environment}-advice-function-arn

  # Monitoring (Production Only)
  AlertSNSTopicArn:
    Condition: IsProd
    Description: SNS Topic ARN for alerts
    Value: !Ref AlertSNSTopic
    Export:
      Name: !Sub memoru-${Environment}-alerts-topic-arn

  DashboardName:
    Condition: IsProd
    Description: CloudWatch Dashboard name
    Value: !Sub memoru-${Environment}-dashboard
