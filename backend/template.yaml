        Application: memoru

  #============================================================
  # N-5: URL カード生成の SQS 非同期化
  #============================================================

  # Dead Letter Queue for UrlGenerateWorkerFunction.
  # After maxReceiveCount (3) failed deliveries a message lands here so failed
  # URL card generations are retained for inspection instead of being lost.
  # NOTE: A CloudWatch Alarm on ApproximateNumberOfMessagesVisible is out of
  # scope for this change and should be added in a follow-up (matches the
  # DuePushJobDLQ convention).
  UrlGenerateWorkerDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub memoru-url-generate-dlq-${Environment}
      # 14 days (in seconds) — maximum retention to allow ample time to
      # inspect/replay failed URL card generation messages.
      MessageRetentionPeriod: 1209600
      # Encrypt with the AWS-managed KMS key for SQS, consistent with the
      # KMS-encrypted DynamoDB tables and DuePushJobDLQ used elsewhere.
      SqsManagedSseEnabled: false
      KmsMasterKeyId: alias/aws/sqs
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # Main work queue: webhook Lambda enqueues; UrlGenerateWorkerFunction consumes.
  UrlGenerateQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub memoru-url-generate-${Environment}
      # VisibilityTimeout must exceed the worker Timeout (120s) so a slow-but-
      # alive invocation is not redelivered mid-flight.
      VisibilityTimeout: 180
      SqsManagedSseEnabled: false
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt UrlGenerateWorkerDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # URL Card Generation Worker (SQS-triggered, async N-5).
  # Fetch → chunk → Bedrock → store → preview push. Uses ReportBatchItemFailures
  # so a failed message is retried by SQS (up to maxReceiveCount) instead of
  # being dropped or re-running the whole batch.
  UrlGenerateWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub memoru-url-generate-worker-${Environment}
      CodeUri: src/
      Handler: jobs.url_generate_worker_handler.handler
      Description: SQS worker for asynchronous URL card generation (N-5)
      Timeout: 120
      MemorySize: 512
      Policies:
        # ProcessedEventsTable: ワーカー側冪等クレーム (URLGENWORK#<event_id>) の
        # 読み書き + URL カードストア (URLCARDS#) の保存に使用。
        - DynamoDBCrudPolicy:
            TableName: !Ref ProcessedEventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:memoru-${Environment}-line-credentials-*
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              # inference profile + 配下の foundation-model ("global." 除去で導出)
              Resource:
                - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${BedrockModelId}
                - !Sub
                  - arn:aws:bedrock:*::foundation-model/${FoundationModelId}
                  - FoundationModelId: !Select [1, !Split ["global.", !Ref BedrockModelId]]
      Environment:
        Variables:
          LINE_CHANNEL_SECRET_ARN: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:memoru-${Environment}-line-credentials
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          PROCESSED_EVENTS_TABLE: !Ref ProcessedEventsTable
      Events:
        UrlGenerateSqs:
          Type: SQS
          Properties:
            Queue: !GetAtt UrlGenerateQueue.Arn
            # 1 件の処理時間 (60〜100 秒級) が Lambda Timeout (120s) に近いため、
            # BatchSize を 1 にしてバッチ途中のタイムアウトによる未処理メッセージの
            # 巻き込み (receive count 増加 → 不当な DLQ 送り) を防ぐ。
            BatchSize: 1
            # 部分失敗を SQS に返し、失敗メッセージのみリトライさせる
            # （BatchSize 1 でも防御として残す）。
            FunctionResponseTypes:
              - ReportBatchItemFailures
            # Bedrock 同時実行を抑えるためワーカーの最大同時実行を制限する。
            ScalingConfig:
              MaximumConcurrency: 2
      Tags:
        Environment: !Ref Environment
        Application: memoru

  #============================================================
  # ai-async-jobs: AI 非同期ジョブ基盤 (SQS + ワーカー)
  #============================================================

  # interactive キューの DLQ（generate/refine/grade_ai/advice/tutor_*）。
  AiJobDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub memoru-ai-job-dlq-${Environment}
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: false
      KmsMasterKeyId: alias/aws/sqs
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # heavy キューの DLQ（generate_from_url）。
  AiJobHeavyDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub memoru-ai-job-heavy-dlq-${Environment}
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: false
      KmsMasterKeyId: alias/aws/sqs
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # interactive キュー: 〜60 秒級の AI ジョブ
  # (generate / refine / grade_ai / advice / tutor_start / tutor_message)。
  AiJobQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub memoru-ai-job-${Environment}
      # VisibilityTimeout はワーカー Timeout (180s) の 1.5 倍
      # (UrlGenerateQueue の既存比率を踏襲)。
      VisibilityTimeout: 270
      SqsManagedSseEnabled: false
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AiJobDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # heavy キュー: 〜120 秒級の重量ジョブ (generate_from_url)。
  # maxReceiveCount 1: Lambda ハードタイムアウト経由の再配信で AI を丸ごと
  # やり直す 3× 課金経路を遮断する (設計レビュー H-5)。失敗は即 DLQ で可視化。
  AiJobHeavyQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub memoru-ai-job-heavy-${Environment}
      VisibilityTimeout: 270
      SqsManagedSseEnabled: false
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AiJobHeavyDLQ.Arn
        maxReceiveCount: 1
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # AI ジョブワーカー (interactive / heavy 両キューを消費)。
  AiJobWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub memoru-ai-job-worker-${Environment}
      CodeUri: src/
      Handler: jobs.ai_job_worker_handler.handler
      Description: SQS worker for asynchronous AI jobs (ai-async-jobs)
      Timeout: 180
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AiJobsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CardsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref DecksTable
        - DynamoDBCrudPolicy:
            TableName: !Ref TutorSessionsTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              # inference profile + 配下の foundation-model ("global." 除去で導出)
              Resource:
                - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${BedrockModelId}
                - !Sub
                  - arn:aws:bedrock:*::foundation-model/${FoundationModelId}
                  - FoundationModelId: !Select [1, !Split ["global.", !Ref BedrockModelId]]
        - !If
          - HasTutorModelId
          - Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${TutorModelId}
                  - !Sub
                    - arn:aws:bedrock:*::foundation-model/${FoundationModelId}
                    - FoundationModelId: !Select [1, !Split ["global.", !Ref TutorModelId]]
          - !Ref AWS::NoValue
        - !If
          - UseAgentCore
          - Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeMemory
                  - bedrock-agentcore:RetrieveMemory
                  - bedrock-agentcore:CreateEvent
                  - bedrock-agentcore:GetEvent
                  - bedrock-agentcore:ListEvents
                  - bedrock-agentcore:RetrieveMemoryRecords
                Resource:
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:memory/${AgentCoreMemoryId}
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:memory/${AgentCoreMemoryId}/*
          - !Ref AWS::NoValue
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          TUTOR_MODEL_ID: !Ref TutorModelId
      Events:
        AiJobSqs:
          Type: SQS
          Properties:
            Queue: !GetAtt AiJobQueue.Arn
            # バッチ途中のタイムアウトによる未処理メッセージの巻き込み
            # (receive count 増加 → 不当な DLQ 送り) を防ぐため BatchSize 1
            # (UrlGenerateWorker の設計判断を踏襲)。
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures
            ScalingConfig:
              MaximumConcurrency: 5
        AiJobHeavySqs:
          Type: SQS
          Properties:
            Queue: !GetAtt AiJobHeavyQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures
            # 重量ジョブ (fetch + 複数 chunk × Bedrock) の同時実行を抑制
            # (UrlGenerateWorker と同値)。
            ScalingConfig:
              MaximumConcurrency: 2
      Tags:
        Environment: !Ref Environment
        Application: memoru

  #============================================================
  # DLQ 滞留アラーム (設計レビュー SM-4: 通知先 SNS の配線は follow-up。
  # アラーム状態はコンソール / ダッシュボードで可視化される)
  #============================================================

  AiJobDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub memoru-ai-job-dlq-messages-${Environment}
      AlarmDescription: AI job messages landed in the DLQ (failed after retries)
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt AiJobDLQ.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  AiJobHeavyDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub memoru-ai-job-heavy-dlq-messages-${Environment}
      AlarmDescription: Heavy AI job messages landed in the DLQ (no retry by design)
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt AiJobHeavyDLQ.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  DuePushJobDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub memoru-due-push-dlq-messages-${Environment}
      AlarmDescription: Due-push job messages landed in the DLQ
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt DuePushJobDLQ.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  UrlGenerateWorkerDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub memoru-url-generate-dlq-messages-${Environment}
      AlarmDescription: URL card generation messages landed in the DLQ
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt UrlGenerateWorkerDLQ.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  #============================================================
  # CloudWatch Logs - LogGroups with Retention
  #============================================================

  # API Function LogGroup
  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ApiFunction}"
      RetentionInDays: !If [IsProd, 90, 14]

  # LINE Webhook Function LogGroup
  LineWebhookFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${LineWebhookFunction}"
      RetentionInDays: !If [IsProd, 90, 14]

  # Due Push Job Function LogGroup
  DuePushJobFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${DuePushJobFunction}"
      RetentionInDays: !If [IsProd, 90, 14]

  # Reviews Grade AI Function LogGroup
  ReviewsGradeAiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ReviewsGradeAiFunction}"
      RetentionInDays: !If [IsProd, 90, 14]

  # Advice Function LogGroup
  AdviceFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AdviceFunction}"
      RetentionInDays: !If [IsProd, 90, 14]

  # URL Generate Worker Function LogGroup (N-5)
  UrlGenerateWorkerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${UrlGenerateWorkerFunction}"
      RetentionInDays: !If [IsProd, 90, 14]

  # AI Job Worker Function LogGroup (ai-async-jobs)
  AiJobWorkerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AiJobWorkerFunction}"
      RetentionInDays: !If [IsProd, 90, 14]

  #============================================================
  # CloudWatch Monitoring (Production Only)
  #============================================================

  # SNS Topic for Alerts
  AlertSNSTopic:
    Type: AWS::SNS::Topic
    Condition: IsProd
    Properties:
      TopicName: !Sub memoru-${Environment}-alerts
      DisplayName: Memoru LIFF Alerts
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # Lambda Error Alarm
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub memoru-${Environment}-lambda-errors
      AlarmDescription: Lambda function error rate exceeds threshold
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      AlarmActions:
        - !Ref AlertSNSTopic
      TreatMissingData: notBreaching

  # API Gateway 5xx Error Alarm
  ApiGateway5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub memoru-${Environment}-api-5xx-errors
      AlarmDescription: API Gateway 5xx error rate exceeds threshold
      MetricName: 5xx
      Namespace: AWS/ApiGateway
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiId
          Value: !Ref HttpApi
      AlarmActions:
        - !Ref AlertSNSTopic
      TreatMissingData: notBreaching

  # DynamoDB Throttle Alarm
  DynamoDBThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub memoru-${Environment}-dynamodb-throttle
      AlarmDescription: DynamoDB throttling detected
      MetricName: ThrottledRequests
      Namespace: AWS/DynamoDB
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: TableName
          Value: !Ref CardsTable
      AlarmActions:
        - !Ref AlertSNSTopic
      TreatMissingData: notBreaching

  # CloudWatch Dashboard
  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Condition: IsProd
    Properties:
      DashboardName: !Sub memoru-${Environment}-dashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Lambda Invocations & Errors",
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "${ApiFunction}", {"color": "#2ca02c"}],
                  [".", "Errors", ".", ".", {"color": "#d62728"}],
                  [".", "Invocations", "FunctionName", "${LineWebhookFunction}", {"color": "#1f77b4"}],
                  [".", "Errors", ".", ".", {"color": "#ff7f0e"}]
                ],
                "region": "${AWS::Region}",
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Lambda Duration",
                "metrics": [
                  ["AWS/Lambda", "Duration", "FunctionName", "${ApiFunction}", {"stat": "p50"}],
                  ["...", {"stat": "p90"}],
                  ["...", {"stat": "p99"}]
                ],
                "region": "${AWS::Region}",
                "period": 300
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "API Gateway Requests",
                "metrics": [
                  ["AWS/ApiGateway", "Count", "ApiId", "${HttpApi}", {"color": "#2ca02c"}],
                  [".", "5xx", ".", ".", {"color": "#d62728"}],
                  [".", "4xx", ".", ".", {"color": "#ff7f0e"}]
                ],
                "region": "${AWS::Region}",
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "API Gateway Latency",
                "metrics": [
                  ["AWS/ApiGateway", "Latency", "ApiId", "${HttpApi}", {"stat": "p50"}],
                  ["...", {"stat": "p90"}],
                  ["...", {"stat": "p99"}]
                ],
                "region": "${AWS::Region}",
                "period": 300
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 12,
              "width": 8,
              "height": 6,
              "properties": {
                "title": "DynamoDB - Users Table",
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${UsersTable}"],
                  [".", "ConsumedWriteCapacityUnits", ".", "."]
                ],
                "region": "${AWS::Region}",
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "x": 8,
              "y": 12,
              "width": 8,
              "height": 6,
              "properties": {
                "title": "DynamoDB - Cards Table",
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${CardsTable}"],
                  [".", "ConsumedWriteCapacityUnits", ".", "."]
                ],
                "region": "${AWS::Region}",
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "x": 16,
              "y": 12,
              "width": 8,
              "height": 6,
              "properties": {
                "title": "DynamoDB - Reviews Table",
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${ReviewsTable}"],
                  [".", "ConsumedWriteCapacityUnits", ".", "."]
                ],
                "region": "${AWS::Region}",
                "period": 300,
                "stat": "Sum"
              }
            }
          ]
        }

Outputs:
  # DynamoDB Tables
  UsersTableName:
    Description: Users table name
    Value: !Ref UsersTable
    Export:
      Name: !Sub memoru-${Environment}-users-table

  UsersTableArn:
    Description: Users table ARN
    Value: !GetAtt UsersTable.Arn
    Export:
      Name: !Sub memoru-${Environment}-users-table-arn

  CardsTableName:
    Description: Cards table name
    Value: !Ref CardsTable
    Export:
      Name: !Sub memoru-${Environment}-cards-table

  CardsTableArn:
    Description: Cards table ARN
    Value: !GetAtt CardsTable.Arn
    Export:
      Name: !Sub memoru-${Environment}-cards-table-arn

  ReviewsTableName:
    Description: Reviews table name
    Value: !Ref ReviewsTable
    Export:
      Name: !Sub memoru-${Environment}-reviews-table

  ReviewsTableArn:
    Description: Reviews table ARN
    Value: !GetAtt ReviewsTable.Arn
    Export:
      Name: !Sub memoru-${Environment}-reviews-table-arn

  DecksTableName:
    Description: Decks table name
    Value: !Ref DecksTable
    Export:
      Name: !Sub memoru-${Environment}-decks-table

  DecksTableArn:
    Description: Decks table ARN
    Value: !GetAtt DecksTable.Arn
    Export:
      Name: !Sub memoru-${Environment}-decks-table-arn

  TutorSessionsTableName:
    Description: Tutor Sessions table name
    Value: !Ref TutorSessionsTable
    Export:
      Name: !Sub memoru-${Environment}-tutor-sessions-table

  TutorSessionsTableArn:
    Description: Tutor Sessions table ARN
    Value: !GetAtt TutorSessionsTable.Arn
    Export:
      Name: !Sub memoru-${Environment}-tutor-sessions-table-arn

  # API Gateway
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub memoru-${Environment}-api-endpoint

  # Lambda Functions
  ApiFunctionArn:
    Description: API Lambda function ARN
    Value: !GetAtt ApiFunction.Arn
    Export:
      Name: !Sub memoru-${Environment}-api-function-arn

  LineWebhookFunctionArn:
    Description: LINE Webhook Lambda function ARN
    Value: !GetAtt LineWebhookFunction.Arn
    Export:
      Name: !Sub memoru-${Environment}-line-webhook-function-arn

  ReviewsGradeAiFunctionArn:
    Description: Reviews Grade AI Lambda function ARN
    Value: !GetAtt ReviewsGradeAiFunction.Arn
    Export:
      Name: !Sub memoru-${Environment}-reviews-grade-ai-function-arn

  AdviceFunctionArn:
    Description: Advice Lambda function ARN
    Value: !GetAtt AdviceFunction.Arn
    Export:
      Name: !Sub memoru-${Environment}-advice-function-arn

  # Monitoring (Production Only)
  AlertSNSTopicArn:
    Condition: IsProd
    Description: SNS Topic ARN for alerts
    Value: !Ref AlertSNSTopic
    Export:
      Name: !Sub memoru-${Environment}-alerts-topic-arn

  DashboardName:
    Condition: IsProd
    Description: CloudWatch Dashboard name
    Value: !Sub memoru-${Environment}-dashboard
