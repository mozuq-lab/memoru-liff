AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Memoru LIFF - Backend API and DynamoDB Tables

Globals:
  Function:
    Timeout: 120
    MemorySize: 256
    Runtime: python3.12
    Architectures:
      - arm64
    Tracing: Active
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        USERS_TABLE: !Ref UsersTable
        CARDS_TABLE: !Ref CardsTable
        REVIEWS_TABLE: !Ref ReviewsTable
        DECKS_TABLE: !Ref DecksTable
        TUTOR_SESSIONS_TABLE: !Ref TutorSessionsTable
        LOG_LEVEL: !If [IsProd, INFO, DEBUG]
        DYNAMODB_ENDPOINT_URL: ""
        AWS_ENDPOINT_URL: ""
        USE_STRANDS: !Ref UseStrands
        OLLAMA_HOST: ""
        OLLAMA_MODEL: ""
        AI_AGENT_TIMEOUT_SECONDS: "30"
        TUTOR_AI_AGENT_TIMEOUT_SECONDS: "60"
        TUTOR_SESSION_BACKEND: !Ref TutorSessionBackend
        AGENTCORE_MEMORY_ID: !Ref AgentCoreMemoryId
        # AI 系エンドポイントのユーザー単位レート制限 (utils/rate_limiter.py)。
        # RATE_LIMITS_TABLE が空なら無効 (ローカル開発既定)。
        RATE_LIMITS_TABLE: !Ref RateLimitsTable
        AI_RATE_LIMIT_PER_WINDOW: "30"
        AI_RATE_LIMIT_WINDOW_SECONDS: "300"
        # AI 非同期ジョブ基盤 (ai-async-jobs)。キュー URL が空 or
        # AI_JOB_WORKER_MODE=inline なら submit ハンドラーが同期実行する
        # (ローカル開発は env.json で inline 指定)。
        AI_JOBS_TABLE: !Ref AiJobsTable
        AI_JOB_QUEUE_URL: !Ref AiJobQueue
        AI_JOB_HEAVY_QUEUE_URL: !Ref AiJobHeavyQueue
        AI_JOB_WORKER_MODE: ""
        # utils/sqs_client.get_sqs_client() 参照。DYNAMODB_ENDPOINT_URL と同じ役割で、
        # ローカル開発時に SQS エンドポイントを差し替えられるようにする
        # (env.json でオーバーライドするための空デフォルト宣言。SAM の --env-vars は
        # テンプレート未宣言のキーを上書きできないため、ここでの宣言が必須)。
        SQS_ENDPOINT_URL: ""

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name

  OidcIssuer:
    Type: String
    Default: https://keycloak.example.com/realms/memoru
    Description: OIDC Issuer URL (Keycloak or Cognito)

  OidcAudience:
    Type: String
    Default: liff-client
    Description: OIDC Audience (JWT audience claim)

  # NOTE (Bedrock IAM): モデル ID は cross-region (global) inference profile 形式
  # "global.anthropic...." を前提とする。IAM の bedrock:InvokeModel Resource は
  # inference-profile ARN と、その配下の foundation-model ARN の両方を必要とする。
  # foundation-model ID は "global." プレフィックスを除いた値 (!Split ["global.", ...])
  # で導出するため、ここで指定する値は必ず "global." で始まる ID にすること。
  BedrockModelId:
    Type: String
    Default: global.anthropic.claude-haiku-4-5-20251001-v1:0
    Description: >-
      Amazon Bedrock model ID for AI card generation.
      Must be a cross-region (global) inference profile ID starting with "global."
      (IAM derives the underlying foundation-model ARN by stripping the "global." prefix).

  TutorModelId:
    Type: String
    Default: ""
    Description: >-
      Bedrock model ID for AI tutor (defaults to BedrockModelId if empty).
      When set, must also be a "global."-prefixed cross-region inference profile ID.

  LineChannelId:
    Type: String
    Default: ""
    Description: LINE Login Channel ID for ID token verification

  # NOTE (CORS): 本番 LIFF フロントの Origin は実環境固有値のためコミットせず、
  # デプロイ時に注入する（Makefile: LIFF_ORIGIN / deploy.yml: vars.LIFF_ORIGIN）。
  # prod では Rules セクション (ProdRequiresLiffOrigin) で必須化しており、
  # 未指定のままだと changeset 作成前に fail-fast する。
  LiffOrigin:
    Type: String
    Default: ""
    Description: >-
      LIFF frontend origin to allow in CORS AllowOrigins
      (e.g. https://liff.<your-domain>). Required for prod deployments
      (asserted by the ProdRequiresLiffOrigin rule); optional for dev/staging
      where localhost origins are also allowed.

  # NOTE: Tutor 機能 (TutorService) は SessionManager 経由のマルチターン会話を使うため
  # USE_STRANDS=true が必須。false のままだと start_session / send_message の submit は
  # 202 を返すものの、ジョブが failed になり、ポーリング時に 503 (code=ai_unavailable)
  # として表面化する — BedrockTutorAIService は SessionManager 非対応のため。
  # 本番 (ENVIRONMENT=prod) では true で運用すること。dev スタックで true にする場合は
  # StrandsTutorAIService が Ollama を要求する点に注意 (ローカル開発用)。
  UseStrands:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable Strands Agents SDK for AI services (Tutor requires "true"; otherwise tutor jobs fail and polling returns 503 ai_unavailable)

  TutorSessionBackend:
    Type: String
    Default: "dynamodb"
    AllowedValues:
      - "agentcore"
      - "dynamodb"
    Description: Tutor session history backend (agentcore or dynamodb)

  AgentCoreMemoryId:
    Type: String
    Default: ""
    Description: AgentCore Memory ID for tutor session management

Rules:
  # prod では LiffOrigin の指定を必須にする。未指定のままだと CORS AllowOrigins に
  # 本番 LIFF フロントの Origin が含まれず、ブラウザから全 API が呼べなくなるため、
  # changeset 作成前にアサーションで fail-fast する（空文字の混入も防ぐ）。
  ProdRequiresLiffOrigin:
    RuleCondition: !Equals [!Ref Environment, prod]
    Assertions:
      - Assert: !Not [!Equals [!Ref LiffOrigin, ""]]
        AssertDescription: >-
          LiffOrigin is required for prod deployments (e.g.
          https://liff.<your-domain>). Set the LIFF_ORIGIN environment variable
          for "make deploy-prod" or the LIFF_ORIGIN GitHub Environment Variable
          for deploy.yml. See docs/deployment-guide-prod.md.

Conditions:
  IsProd: !Equals [!Ref Environment, prod]
  IsNotProd: !Not [!Equals [!Ref Environment, prod]]
  HasTutorModelId: !Not [!Equals [!Ref TutorModelId, ""]]
  UseAgentCore: !Equals [!Ref TutorSessionBackend, "agentcore"]
  HasLiffOrigin: !Not [!Equals [!Ref LiffOrigin, ""]]

Resources:
  #============================================================
  # DynamoDB Tables
  #============================================================

  # Users Table
  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub memoru-users-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: line_user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: line_user_id-index
          KeySchema:
            - AttributeName: line_user_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      DeletionProtectionEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # Cards Table
  CardsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub memoru-cards-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: card_id
          AttributeType: S
        - AttributeName: next_review_at
          AttributeType: S
        - AttributeName: deck_index_key
          AttributeType: S
        - AttributeName: reference_url_key
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: card_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: user_id-due-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: next_review_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # deck-cards-index: デッキ別カード集計 (get_deck_card_counts / get_deck_due_counts) を
        # COUNT クエリ化するための GSI。カウント用途のみのため Projection は KEYS_ONLY で最小化する。
        # next_review_at を RANGE キーに置くことで due 集計を KeyCondition (deck_index_key = :k AND
        # next_review_at <= :now) で絞り込める。next_review_at は ISO8601 文字列で、辞書順比較が
        # 時刻順と一致する (review #11)。
        # HASH キー deck_index_key は "<user_id>#<deck_id>" の複合キー (PR #47 [P2])。
        # deck_id 単体だと異なるユーザーが同一 deck_id を持つ場合に他ユーザーのカードまで
        # 集計してしまうため、user_id をキーに含めてユーザー境界を保証する。
        # 注意 1 (スパースインデックス): deck_id を持たないカードは deck_index_key も持たず
        # この GSI に投影されないため、未分類カードは集計対象に含まれない。
        # 注意 2 (マイグレーション): 既存カードには deck_index_key 属性が無く GSI に投影されない。
        #   再保存 (create/update) 時に属性が投影される。本番は現状デプロイ環境・既存データが
        #   無い前提のため移行スクリプトは不要。
        # 注意 3 (オンラインバックフィル): 既存テーブルへの GSI 追加は DynamoDB が
        # バックフィルを自動実行する。バックフィル完了までは GSI クエリが不完全な結果を返し得る。
        - IndexName: deck-cards-index
          KeySchema:
            - AttributeName: deck_index_key
              KeyType: HASH
            - AttributeName: next_review_at
              KeyType: RANGE
          Projection:
            ProjectionType: KEYS_ONLY
        # reference-url-index: URL からのカード生成時の重複検出 (find_cards_by_reference_url)
        # を全件 scan から Query 化するための GSI (M-13)。HASH キー reference_url_key は
        # "<user_id>#<url>" の複合キーで、生成元 URL (先頭の type=="url" reference) を1件採用する
        # (Card.to_dynamodb_item)。url reference を持たないカードは属性を持たずスパース化される。
        # 重複検出は一致カード本体を参照する用途のため Projection は ALL。
        # 注意 (マイグレーション): 既存カードには reference_url_key 属性が無く GSI に投影されない。
        #   再保存 (create/update) 時に投影される。既存データのバックフィルは
        #   backend/scripts/backfill_reference_url_key.py を参照 (本番はユーザーが手動実行)。
        - IndexName: reference-url-index
          KeySchema:
            - AttributeName: reference_url_key
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      DeletionProtectionEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # Reviews Table
  ReviewsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub memoru-reviews-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: card_id
          AttributeType: S
        - AttributeName: reviewed_at
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: card_id
          KeyType: HASH
        - AttributeName: reviewed_at
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: user_id-reviewed_at-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: reviewed_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # TTL は指定しない (I-7): review_service は expires_at を書き込まないため
      # TimeToLiveSpecification を設定しても実質無効だった。レビュー履歴は統計用に
      # 永久保持する。保持方針を変える場合は、コード側で expires_at を書き込む実装と
      # セットで TimeToLiveSpecification (AttributeName: expires_at) を再導入すること。
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      DeletionProtectionEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # Tutor Sessions Table
  TutorSessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub memoru-tutor-sessions-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: session_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: user_id-status-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      DeletionProtectionEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # Decks Table
  DecksTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub memoru-decks-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: deck_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: deck_id
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      DeletionProtectionEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  BrowserProfilesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub memoru-browser-profiles-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: profile_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: profile_id
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      DeletionProtectionEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # Processed webhook events table — idempotency for LINE webhook redelivery (N-6)
  ProcessedEventsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub memoru-processed-events-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: webhook_event_id
          AttributeType: S
      KeySchema:
        - AttributeName: webhook_event_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      DeletionProtectionEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # AI 非同期ジョブレコード (ai-async-jobs)。submit で queued 登録され、
  # ワーカーが claim (queued→processing) して結果を記録、フロントがポーリングで参照。
  # 24h TTL の使い捨てデータのため DeletionPolicy: Retain は付けない。
  AiJobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub memoru-ai-jobs-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  # ユーザー単位レート制限カウンタ (AI 系エンドポイント)。
  # 固定ウィンドウのカウンタのみを保持する使い捨てデータのため、
  # 他テーブルと異なり DeletionPolicy: Retain は付けない。
  RateLimitsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub memoru-rate-limits-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: memoru

  #============================================================
  # API Gateway (HTTP API)
  #============================================================

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        # LiffOrigin は実環境の LIFF フロント Origin（デプロイ時に注入）。
        # prod は Rules (ProdRequiresLiffOrigin) で必須化済みのため常に含める。
        # dev/staging は未指定でも動くよう localhost 系を維持し、指定時のみ追加する
        # （空文字を AllowOrigins に混入させない）。
        AllowOrigins: !If
          - IsNotProd
          - !If
            - HasLiffOrigin
            - - https://liff.line.me
              - !Ref LiffOrigin
              - http://localhost:5173
              - http://localhost:3000
            - - https://liff.line.me
              - http://localhost:5173
              - http://localhost:3000
          - - https://liff.line.me
            - !Ref LiffOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Amz-Date
          - X-Api-Key
          - X-Amz-Security-Token
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        # AllowCredentials は指定しない (#14): Bearer トークン運用で Cookie を使わないため
        # 不要。フロント (frontend/src/services/api.ts) の fetch も credentials:'include'
        # を使っておらず、Authorization ヘッダーのみで認証している。
        MaxAge: 3600
      Auth:
        DefaultAuthorizer: JwtAuthorizer
        Authorizers:
          JwtAuthorizer:
            AuthorizationScopes:
              - openid
              - profile
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Ref OidcIssuer
              audience:
                - !Ref OidcAudience
      Tags:
        Environment: !Ref Environment
        Application: memoru

  #============================================================
  # Lambda Functions
  #============================================================

  # Main API Function
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub memoru-api-${Environment}
      CodeUri: src/
      Handler: api.handler.handler
      Description: Main API handler for Memoru LIFF application
      ReservedConcurrentExecutions: 100
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CardsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref DecksTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BrowserProfilesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref TutorSessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RateLimitsTable
        # ai-async-jobs: ジョブ登録 (generate/refine/tutor_*) + interactive キュー送信
        - DynamoDBCrudPolicy:
            TableName: !Ref AiJobsTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt AiJobQueue.QueueName
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              # cross-region (global) inference profile とその配下の foundation-model の両方を許可。
              # foundation-model ID は BedrockModelId から "global." を除いた値で導出する。
              Resource:
                - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${BedrockModelId}
                - !Sub
                  - arn:aws:bedrock:*::foundation-model/${FoundationModelId}
                  - FoundationModelId: !Select [1, !Split ["global.", !Ref BedrockModelId]]
        - !If
          - HasTutorModelId
          - Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${TutorModelId}
                  - !Sub
                    - arn:aws:bedrock:*::foundation-model/${FoundationModelId}
                    - FoundationModelId: !Select [1, !Split ["global.", !Ref TutorModelId]]
          - !Ref AWS::NoValue
        - !If
          - UseAgentCore
          - Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeMemory
                  - bedrock-agentcore:RetrieveMemory
                  - bedrock-agentcore:CreateEvent
                  - bedrock-agentcore:GetEvent
                  - bedrock-agentcore:ListEvents
                  - bedrock-agentcore:RetrieveMemoryRecords
                # 対象 Memory とその配下リソース（イベント / メモリレコード等、
                # memory/<id>/... 形式の ARN を持つ API）に限定する。
                # 従来は "*" で全 AgentCore リソースにアクセス可能だった。
                Resource:
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:memory/${AgentCoreMemoryId}
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:memory/${AgentCoreMemoryId}/*
          - !Ref AWS::NoValue
      Environment:
        Variables:
          OIDC_ISSUER: !Ref OidcIssuer
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          TUTOR_MODEL_ID: !Ref TutorModelId
          LINE_CHANNEL_ID: !Ref LineChannelId
          BROWSER_PROFILES_TABLE: !Ref BrowserProfilesTable
      Events:
        # User endpoints
        GetUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /users/me
            Method: GET
        UpdateUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
