AWSTemplateFormatVersion: '2010-09-09'
Description: Memoru LIFF - Cognito User Pool Infrastructure

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name

  CognitoDomainPrefix:
    Type: String
    Description: Cognito domain prefix (e.g. memoru-dev). Full domain will be {prefix}.auth.{region}.amazoncognito.com
    AllowedPattern: ^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$
    ConstraintDescription: Must be lowercase alphanumeric with optional hyphens, 1-63 characters

  CallbackUrls:
    Type: CommaDelimitedList
    Description: Allowed callback URLs (comma-separated)

  LogoutUrls:
    Type: CommaDelimitedList
    Description: Allowed logout URLs (comma-separated)

Conditions:
  IsProd: !Equals [!Ref Environment, prod]

Resources:
  #============================================================
  # Cognito User Pool
  #============================================================
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub memoru-${Environment}-user-pool
      DeletionProtection: !If [IsProd, ACTIVE, INACTIVE]
      # Sign-in configuration
      UsernameAttributes:
        - email
      UsernameConfiguration:
        CaseSensitive: false
      AutoVerifiedAttributes:
        - email
      # MFA configuration (OPTIONAL: users can enable TOTP)
      MfaConfiguration: OPTIONAL
      EnabledMfas:
        - SOFTWARE_TOKEN_MFA
      # Password policy
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7
      # Email configuration
      # NOTE: Default Cognito email has 50/day limit.
      # For production, configure SES integration:
      # EmailConfiguration:
      #   EmailSendingAccount: DEVELOPER
      #   SourceArn: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/noreply@example.com
      # Schema attributes
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      # Account recovery
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      UserPoolTags:
        Environment: !Ref Environment
        Application: memoru

  #============================================================
  # Cognito User Pool Domain (Prefix-based)
  #============================================================
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref UserPool

  #============================================================
  # Cognito User Pool Client (Public, PKCE)
  #============================================================
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub memoru-${Environment}-liff-client
      UserPoolId: !Ref UserPool
      # Public client (no secret) - suitable for SPA with PKCE
      GenerateSecret: false
      # OAuth2 configuration
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - profile
        - email
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs: !Ref CallbackUrls
      LogoutURLs: !Ref LogoutUrls
      # PKCE support (S256)
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
      # Token validity
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      # Security settings
      PreventUserExistenceErrors: ENABLED

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
    Export:
      Name: !Sub memoru-${Environment}-cognito-user-pool-id

  UserPoolArn:
    Description: Cognito User Pool ARN
    Value: !GetAtt UserPool.Arn
    Export:
      Name: !Sub memoru-${Environment}-cognito-user-pool-arn

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub memoru-${Environment}-cognito-client-id

  OidcIssuerUrl:
    Description: >-
      OIDC Issuer URL for backend configuration.
      Set this as OidcIssuer in backend/template.yaml parameters.
    Value: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
    Export:
      Name: !Sub memoru-${Environment}-cognito-oidc-issuer

  CognitoDomainUrl:
    Description: Cognito Hosted UI domain URL
    Value: !Sub https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com
    Export:
      Name: !Sub memoru-${Environment}-cognito-domain-url

  IntegrationGuide:
    Description: >-
      === Memoru Backend/Frontend Integration Guide ===

      [Backend - backend/template.yaml parameters]
        OidcIssuer: (use OidcIssuerUrl output above)
        OidcAudience: (use UserPoolClientId output above)

      [Frontend - OIDC configuration]
        VITE_OIDC_AUTHORITY: (use OidcIssuerUrl output above)
        VITE_OIDC_CLIENT_ID: (use UserPoolClientId output above)

      [Important: JWT Authorizer and Cognito access tokens]
        Cognito access tokens do NOT include a standard 'aud' claim.
        API Gateway JWT Authorizer validates audience using the 'aud' claim,
        so access token validation may fail. Two options:
        1. Use ID tokens for API authorization (ID token includes aud = client_id)
        2. Set OidcAudience to the client_id value — this works with ID tokens
        The current backend configuration uses OidcAudience for JWT audience
        validation, so set it to the UserPoolClientId value.
    Value: !Sub >-
      OidcIssuer -> https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
      | OidcAudience -> ${UserPoolClient}
      | CognitoDomain -> https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com
